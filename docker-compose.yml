# docker-compose.yml — TrajectorySim Production Stack
services:
  # ── Message Broker ──
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Database ──
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Server ──
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ── Background Worker ──
  worker:
    build: ./backend
    command: ["python", "worker.py"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ── React Frontend (Nginx) ──
  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mongo-data:
