version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - trajectory-net

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - trajectory-net

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      - redis
      - mongodb
    networks:
      - trajectory-net

  worker:
    build: ./backend
    command: ["python", "worker.py"]
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017
    depends_on:
      - redis
      - mongodb
    networks:
      - trajectory-net

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - trajectory-net

networks:
  trajectory-net:
    driver: bridge

volumes:
  mongo-data:
