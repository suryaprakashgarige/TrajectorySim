apiVersion: apps/v1
kind: Deployment
metadata:
  name: trajectory-backend
  labels:
    app: trajectory-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trajectory-backend
  template:
    metadata:
      labels:
        app: trajectory-backend
    spec:
      containers:
      - name: backend
        image: trajectory-backend:latest
        imagePullPolicy: Never # Assuming local build for testing
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        - name: MONGO_URL
          value: "mongodb://mongo-service:27017"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: trajectory-backend-svc
spec:
  type: ClusterIP
  selector:
    app: trajectory-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "trajectory-backend-svc"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: trajectory-backend-svc
            port:
              number: 8000
