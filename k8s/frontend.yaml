apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  config.js: |
    window.ENV = {
      API_URL: "http://localhost:8000" // Update this to your public Ingress URL
    };
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trajectory-frontend
  labels:
    app: trajectory-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trajectory-frontend
  template:
    metadata:
      labels:
        app: trajectory-frontend
    spec:
      containers:
      - name: frontend
        image: trajectory-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config-volume
          mountPath: /usr/share/nginx/html/config.js
          subPath: config.js
      volumes:
      - name: config-volume
        configMap:
          name: frontend-config
---
apiVersion: v1
kind: Service
metadata:
  name: trajectory-frontend-svc
spec:
  type: LoadBalancer
  selector:
    app: trajectory-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
