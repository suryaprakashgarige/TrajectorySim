apiVersion: apps/v1
kind: Deployment
metadata:
  name: propulsion-service
  namespace: missile-sim
  labels:
    app: propulsion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: propulsion-service
  template:
    metadata:
      labels:
        app: propulsion-service
    spec:
      containers:
        - name: propulsion-service
          image: ghcr.io/suryaprakashgarige/trajectorysim/propulsion-service:latest
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: sim-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: propulsion-service
  namespace: missile-sim
spec:
  selector:
    app: propulsion-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5002
  type: ClusterIP
